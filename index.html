<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tubiana Family Recipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&family=Noto+Sans+Hebrew:wght@300;400;500&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FDFDFB;
    --sand: #F4F4EF;
    --terracotta: #C4622D;
    --terracotta-light: #F0D9CC;
    --olive: #5C6B3A;
    --olive-light: #D6DEAD;
    --med-blue: #1A5AA8;
    --med-blue-deep: #134A8C;
    --ochre: #E2A36A;
    --ink: #1E1A14;
    --muted: #7A7162;
    --border: #E4E5E0;
    --white: #FFFFFF;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  html[lang="he"], html[lang="he"] h1, html[lang="he"] .section-header h2, html[lang="he"] .card-body h3, html[lang="he"] .modal-title {
    font-family: 'Noto Sans Hebrew', 'Inter', sans-serif;
  }
  html[lang="ar"], html[lang="ar"] h1, html[lang="ar"] .section-header h2, html[lang="ar"] .card-body h3, html[lang="ar"] .modal-title {
    font-family: 'Noto Naskh Arabic', 'Inter', sans-serif;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(160deg, var(--med-blue) 0%, var(--med-blue-deep) 100%);
    color: var(--cream);
    padding: 4rem 2rem 3.5rem;
    text-align: center;
  }
  .header-eyebrow { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ochre); margin-bottom: 1.25rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 6vw, 4.5rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; color: var(--white); text-shadow: 0 1px 12px rgba(0,0,0,0.18); }
  header h1 em { font-style: italic; color: var(--ochre); }
  .header-sub { margin-top: 1.25rem; font-size: 0.95rem; color: rgba(248,244,237,0.7); font-weight: 300; letter-spacing: 0.04em; }

  /* ── NAV ── */
  nav { background: var(--sand); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 1000px; margin: 0 auto; padding: 0.5rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .nav-tabs { display: flex; overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-btn { background: none; border: none; padding: 0.7rem 1.1rem; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
  .nav-btn:hover { color: var(--ink); }
  .nav-btn.active { color: var(--terracotta); border-bottom-color: var(--terracotta); font-weight: 500; }
  .nav-controls { margin-inline-start: auto; display: flex; gap: 0.6rem; align-items: center; }
  .search, .lang-select, .scope-select { background: var(--white); border: 1px solid var(--border); border-radius: 2px; padding: 0.45rem 0.7rem; font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--ink); }
  .search { width: 160px; }
  .lang-select, .scope-select { cursor: pointer; }

  /* ── FILTER BAR ── */
  .filter-bar { max-width: 1000px; margin: 0 auto; padding: 1.5rem 2rem 0; display: flex; flex-wrap: wrap; gap: 1rem 1.75rem; }
  .filter-group { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .filter-label { font-size: 0.66rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .chip { background: var(--white); border: 1px solid var(--border); border-radius: 999px; padding: 0.32rem 0.75rem; font-family: 'Inter', sans-serif; font-size: 0.74rem; color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; gap: 0.35rem; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .chip:hover { border-color: var(--muted); }
  .chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .chip-ic { width: 15px; height: 15px; display: inline-flex; }
  .chip-ic svg { width: 100%; height: 100%; }
  .chip.allergen.active { background: #8A2B12; border-color: #8A2B12; color: #fff; text-decoration: line-through; }

  /* ── BADGES (cards & modal) ── */
  .card-badges { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.8rem; }
  .card-badges:empty { margin-top: 0; }
  .modal-badges { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; padding: 1.1rem 1.75rem 0; }
  .kosher-pill { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.18rem 0.45rem; border-radius: 3px; }
  .kosher-meat  { background: rgba(196,98,45,0.14); color: #9E4A1E; }
  .kosher-dairy { background: rgba(26,90,168,0.14); color: #134A8C; }
  .kosher-parve { background: rgba(92,107,58,0.16); color: #46522C; }
  .allergen-ic { width: 18px; height: 18px; color: var(--muted); display: inline-flex; }
  .allergen-ic svg { width: 100%; height: 100%; }

  /* ── LAYOUT ── */
  main { max-width: 1000px; margin: 0 auto; padding: 3rem 2rem 5rem; }
  .section-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 400; color: var(--ink); }
  .section-count { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; margin-bottom: 3.5rem; }

  /* ── RECIPE CARD ── */
  .recipe-card { background: var(--white); border: 1px solid var(--border); border-radius: 2px; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; overflow: hidden; display: flex; flex-direction: column; }
  .recipe-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(30,26,20,0.1); }
  .recipe-photo { height: 150px; overflow: hidden; }
  .recipe-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-clipart { width: 100%; height: 100%; }
  .photo-clipart svg { width: 100%; height: 100%; display: block; }
  .card-tag { display: block; padding: 0.7rem 1rem 0; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--terracotta); }
  .card-body { padding: 0.5rem 1rem 1.1rem; }
  .card-body h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 400; color: var(--ink); line-height: 1.3; margin-bottom: 0.4rem; }
  .card-body p { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin-bottom: 0.6rem; }
  .card-by { font-size: 0.74rem; color: var(--olive); font-style: italic; margin-bottom: 0.7rem; }
  .card-meta { display: flex; gap: 1rem; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.04em; flex-wrap: wrap; }
  .card-meta span::before { content: '·'; margin-inline-end: 0.4rem; }
  .card-meta span:first-child::before { content: ''; margin-inline-end: 0; }

  /* ── MODAL ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(30,26,20,0.6); z-index: 200; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 2px; width: 100%; max-width: 620px; position: relative; margin: auto; overflow: hidden; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.85); border: none; font-size: 1.3rem; color: var(--ink); cursor: pointer; line-height: 1; width: 2rem; height: 2rem; border-radius: 50%; }
  [dir="rtl"] .modal-close { right: auto; left: 1rem; }
  .modal-photo { height: 220px; overflow: hidden; }
  .modal-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-tag { padding: 1.5rem 1.75rem 0; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--terracotta); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 400; padding: 0.4rem 1.75rem 0; color: var(--ink); line-height: 1.2; }
  .modal-desc { padding: 0.75rem 1.75rem 0; font-size: 0.9rem; color: var(--muted); line-height: 1.65; }
  .modal-by { padding: 0.6rem 1.75rem 0; font-size: 0.84rem; color: var(--olive); font-style: italic; }
  .modal-divider { height: 1px; background: var(--border); margin: 1.25rem 1.75rem; }
  .modal-meta { display: flex; gap: 1.5rem; padding: 0 1.75rem; flex-wrap: wrap; }
  .modal-meta-item { display: flex; flex-direction: column; gap: 0.1rem; }
  .modal-meta-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .modal-meta-value { font-size: 0.9rem; color: var(--ink); font-weight: 400; }
  .modal-section { padding: 1.25rem 1.75rem 0; }
  .modal-section h4 { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--olive); margin-bottom: 0.75rem; }
  .ingredients-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem 1.5rem; }
  .ingredients-list li { font-size: 0.88rem; color: var(--ink); padding: 0.3rem 0; border-bottom: 1px solid var(--sand); display: flex; justify-content: space-between; gap: 0.5rem; }
  .ingredients-list li span { color: var(--muted); font-size: 0.82rem; white-space: nowrap; }
  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li { counter-increment: steps; display: flex; gap: 1rem; font-size: 0.9rem; color: var(--ink); line-height: 1.65; padding: 0.6rem 0; border-bottom: 1px solid var(--sand); }
  .steps-list li:last-child { border-bottom: none; }
  .steps-list li::before { content: counter(steps); font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--terracotta); min-width: 1.25rem; padding-top: 0.05rem; line-height: 1.5; }
  .modal-note { margin: 1.25rem 1.75rem 0; padding: 0.75rem 1rem; background: var(--terracotta-light); border-inline-start: 3px solid var(--terracotta); font-size: 0.82rem; color: var(--ink); font-style: italic; line-height: 1.6; }
  .modal-note-info { background: var(--olive-light); border-inline-start-color: var(--olive); font-style: normal; }
  .note-list { list-style: disc; padding-inline-start: 1.1rem; margin: 0; font-style: normal; }
  .note-list li { padding: 0.22rem 0; line-height: 1.55; }
  .modal-actions { padding: 1.5rem 1.75rem 1.75rem; }
  .print-btn { background: var(--med-blue); color: #fff; border: none; border-radius: 2px; padding: 0.6rem 1.1rem; font-family: 'Inter', sans-serif; font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .print-btn:hover { background: var(--med-blue-deep); }

  /* ── EMPTY / NO RESULTS ── */
  .empty-section, .no-results { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.88rem; border: 1px dashed var(--border); margin-bottom: 3.5rem; }
  .empty-section p:first-child { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--ink); margin-bottom: 0.4rem; }

  footer { text-align: center; padding: 2rem; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); letter-spacing: 0.05em; }

  /* ── MOBILE: tablets + large phones ── */
  @media (max-width: 760px) {
    /* Nav */
    .nav-inner { padding: 0.6rem 1rem; gap: 0.5rem; }
    .nav-controls { width: 100%; margin-inline-start: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .search { width: 100%; grid-column: 1 / -1; }
    .scope-select, .lang-select { width: 100%; min-width: 0; }

    /* Filter bar */
    .filter-bar { padding: 1rem 1rem 0; gap: 0.6rem 1.25rem; }

    /* Modal: tighter padding, fix ingredients at this breakpoint */
    .modal-tag { padding: 1.25rem 1.25rem 0; }
    .modal-title { padding: 0.35rem 1.25rem 0; font-size: 1.45rem; }
    .modal-desc { padding: 0.6rem 1.25rem 0; }
    .modal-by { padding: 0.5rem 1.25rem 0; }
    .modal-badges { padding: 0.75rem 1.25rem 0; }
    .modal-divider { margin: 1rem 1.25rem; }
    .modal-meta { padding: 0 1.25rem; }
    .modal-section { padding: 1rem 1.25rem 0; }
    .modal-note { margin: 1rem 1.25rem 0; }
    .modal-actions { padding: 1.25rem 1.25rem 1.75rem; }

    /* Ingredients: always single column on mobile so nothing gets clipped */
    .ingredients-list { grid-template-columns: 1fr; }
    /* Allow quantity text to wrap instead of pushing layout off-screen */
    .ingredients-list li span { white-space: normal; }
  }

  /* ── MOBILE: small phones (bottom-sheet modal) ── */
  @media (max-width: 540px) {
    header { padding: 2.5rem 1.25rem 2rem; }

    /* Filter chips scroll horizontally */
    .filter-group { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.25rem; scrollbar-width: none; }
    .filter-group::-webkit-scrollbar { display: none; }

    main { padding: 2rem 1rem 4rem; }
    .section-header { margin-bottom: 1.25rem; }

    /* Bottom-sheet modal — slides up from bottom edge */
    .overlay { padding: 0; align-items: flex-end; overflow: hidden; }
    .modal {
      border-radius: 14px 14px 0 0;
      max-height: 90vh;
      max-height: 90dvh;
      /* Explicit x/y overflow so the base overflow:hidden is fully overridden */
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0;
      width: 100%;
    }
    /* Clip photo to match rounded top corners of the sheet */
    .modal-photo { border-radius: 14px 14px 0 0; }
    .modal-close { top: 0.75rem; }
    [dir="rtl"] .modal-close { right: auto; left: 0.75rem; }

    /* Tighter modal padding on small screens */
    .modal-tag { padding: 1.25rem 1rem 0; }
    .modal-title { padding: 0.35rem 1rem 0; font-size: 1.3rem; }
    .modal-desc { padding: 0.6rem 1rem 0; }
    .modal-by { padding: 0.5rem 1rem 0; }
    .modal-badges { padding: 0.75rem 1rem 0; }
    .modal-divider { margin: 1rem; }
    .modal-meta { padding: 0 1rem; }
    .modal-section { padding: 1rem 1rem 0; }
    .modal-note { margin: 1rem 1rem 0; }
    /* Extra bottom padding clears iOS home-bar */
    .modal-actions { padding: 1.25rem 1rem 2.5rem; }

    /* Full-width print button is easier to tap */
    .print-btn { width: 100%; text-align: center; justify-content: center; }

    .submit-cta { padding: 2rem 1rem; }
  }

  /* ── SUBMIT CTA ── */
  .submit-cta { background: var(--sand); border-top: 1px solid var(--border); padding: 2.5rem 2rem; text-align: center; }
  .submit-cta-btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.65rem 1.75rem; border-radius: 2px; border: 1px solid var(--ochre); background: var(--ochre); color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; white-space: nowrap; transition: background 0.2s, border-color 0.2s; }
  .submit-cta-btn:hover { background: var(--terracotta); border-color: var(--terracotta); }

  @media print {
    header, nav, footer, main { display: none !important; }
    .overlay { position: static !important; display: block !important; background: none !important; padding: 0 !important; overflow: visible !important; }
    .modal { box-shadow: none !important; max-width: 100% !important; border: none !important; }
    .modal-close, .modal-actions { display: none !important; }
  }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow" id="eyebrow"></p>
  <h1>Tubiana <em id="brandEm"></em></h1>
  <p class="header-sub" id="sub"></p>
</header>

<nav>
  <div class="nav-inner">
    <div class="nav-tabs" id="navTabs"></div>
    <div class="nav-controls">
      <input id="search" class="search" type="search" oninput="onSearch(this.value)" aria-label="Search">
      <select id="scopeSelect" class="scope-select" onchange="onScope(this.value)" aria-label="Search scope"></select>
      <select id="langSelect" class="lang-select" onchange="setLang(this.value)" aria-label="Language"></select>
    </div>
  </div>
</nav>

<div id="filterBar" class="filter-bar"></div>

<main id="main"></main>

<section class="submit-cta">
  <a class="submit-cta-btn" id="submitCtaBtn" href="https://forms.gle/A78oK4t3BgbkS1rC7" target="_blank" rel="noopener noreferrer">Submit a Recipe</a>
</section>

<footer id="footer"></footer>

<div class="overlay" id="overlay" onclick="closeIfBg(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeRecipe()" aria-label="Close">×</button>
    <div id="modal-content"></div>
  </div>
</div>

/* ──────────────────────────────────────────────────────────
   APP
   ────────────────────────────────────────────────────────── */
const CATS = ['mains','sides','desserts'];
const ORDER = ['en','fr','de','es','ro','he','ar'];
let lang = 'en', filter = 'all', query = '', currentId = null, searchScope = 'tab';
let kosherFilter = 'all';
let pasFilter = false;
const hidden = new Set();

function ui() { return I18N[lang]; }
function kosherName(id) { const k = recipes[id].kosher; return KOSHER[k][lang] || KOSHER[k].en; }
function allergenLabel(a) { return ALLERGEN_LABELS[a][lang] || ALLERGEN_LABELS[a].en; }
function passKosher(id) { return kosherFilter === 'all' || recipes[id].kosher === kosherFilter; }
function passAllergens(id) { return !recipes[id].allergens.some(a => hidden.has(a)); }
function passPassover(id) { return !pasFilter || recipes[id].passover === true; }
function badgesHTML(id) {
  const r = recipes[id];
  const pill = `<span class="kosher-pill kosher-${r.kosher}">${esc(kosherName(id))}</span>`;
  const ic = r.allergens.map(a => `<span class="allergen-ic" title="${esc(allergenLabel(a))}">${ICONS[a]}</span>`).join('');
  return pill + ic;
}
function content(id) { return recipes[id].t[lang] || recipes[id].t.en; }
function hasTranslation(id) { return !!recipes[id].t[lang]; }

/* Flat clipart of a plated meal — used as the temporary photo */
const MEAL_CLIPART = `<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function photoHTML(id, tall) {
  const r = recipes[id];
  if (!r.image) return '';                                  // no photo → no empty space at all
  const cls = tall ? 'modal-photo' : 'recipe-photo';
  const inner = (r.image === 'clipart')
    ? `<div class="photo-clipart">${MEAL_CLIPART}</div>`
    : `<img src="${esc(r.image)}" alt="${esc(content(id).title)}">`;
  return `<div class="${cls}">${inner}</div>`;
}

function recipeText(id) {
  const c = content(id), r = recipes[id];
  const noteText = Array.isArray(c.note) ? c.note.join(' ') : (c.note || '');
  return [
    c.title, c.desc, c.tag,
    c.ingredients.map(i => i[0] + ' ' + i[1]).join(' '),
    c.steps.join(' '),
    noteText,
    r.contributor || '',
  ].join(' ').toLowerCase();
}

function matchSearch(id, q) {
  if (!q) return true;
  return recipeText(id).includes(q);
}

function buildTabs() {
  document.getElementById('navTabs').innerHTML = ['all', ...CATS].map(key =>
    `<button class="nav-btn ${filter===key?'active':''}" onclick="setFilter('${key}')">${esc(ui().cats[key])}</button>`
  ).join('');
}

function buildLangOptions() {
  document.getElementById('langSelect').innerHTML = ORDER.map(code =>
    `<option value="${code}" ${code===lang?'selected':''}>${esc(I18N[code].langName)}</option>`
  ).join('');
}

function buildScopeOptions() {
  const u = ui();
  const tabName = u.cats[filter] || u.scopeTab;
  document.getElementById('scopeSelect').innerHTML =
    `<option value="tab" ${searchScope==='tab'?'selected':''}>${esc(tabName)}</option>` +
    `<option value="all" ${searchScope==='all'?'selected':''}>${esc(u.scopeAll)}</option>`;
}

function buildFilters() {
  const u = ui();
  const kosherBtns = ['all','meat','dairy','parve'].map(k => {
    const label = (k === 'all') ? u.cats.all : (KOSHER[k][lang] || KOSHER[k].en);
    return `<button class="chip ${kosherFilter===k?'active':''}" onclick="toggleKosher('${k}')">${esc(label)}</button>`;
  }).join('');
  const allergBtns = ALLERGENS.map(a =>
    `<button class="chip allergen ${hidden.has(a)?'active':''}" onclick="toggleAllergen('${a}')"><span class="chip-ic">${ICONS[a]}</span>${esc(allergenLabel(a))}</button>`
  ).join('');
  const passoverBtn = `<button class="chip ${pasFilter?'active':''}" onclick="togglePassover()">${esc(FILTER_UI[lang].passover)}</button>`;
  document.getElementById('filterBar').innerHTML =
    `<div class="filter-group"><span class="filter-label">${esc(FILTER_UI[lang].kosher)}</span>${kosherBtns}${passoverBtn}</div>` +
    `<div class="filter-group"><span class="filter-label">${esc(FILTER_UI[lang].hide)}</span>${allergBtns}</div>`;
}

function toggleKosher(k) { kosherFilter = k; buildFilters(); render(); }
function toggleAllergen(a) { hidden.has(a) ? hidden.delete(a) : hidden.add(a); buildFilters(); render(); }
function togglePassover() { pasFilter = !pasFilter; buildFilters(); render(); }

function card(id) {
  const c = content(id), r = recipes[id], u = ui();
  const by = r.contributor ? `<p class="card-by">${esc(u.contributedBy)} ${esc(r.contributor)}</p>` : '';
  return `<div class="recipe-card" onclick="openRecipe('${id}')">
    ${photoHTML(id, false)}
    <span class="card-tag">${esc(c.tag)}</span>
    <div class="card-body">
      <h3>${esc(c.title)}</h3>
      <p>${esc(c.desc)}</p>
      ${by}
      <div class="card-meta">
        <span>${esc(c.time)}</span>
        <span>${esc(u.servesLabel)} ${esc(r.serves)}</span>
      </div>
      <div class="card-badges">${badgesHTML(id)}</div>
    </div>
  </div>`;
}

function render() {
  const u = ui(), main = document.getElementById('main');
  const q = query.trim().toLowerCase();
  let html = '', anyShown = false;

  const searchingAll = q && searchScope === 'all';
  const filtering = q || kosherFilter !== 'all' || hidden.size > 0 || pasFilter;

  CATS.forEach(cat => {
    if (!searchingAll && filter !== 'all' && filter !== cat) return;
    const ids = Object.keys(recipes).filter(id =>
      recipes[id].category === cat && passKosher(id) && passAllergens(id) && passPassover(id) && matchSearch(id, q));
    if (ids.length) {
      anyShown = true;
      html += `<div class="recipe-section">
        <div class="section-header"><h2>${esc(u.cats[cat])}</h2><span class="section-count">${ids.length} ${esc(u.countWord)}</span></div>
        <div class="recipe-grid">${ids.map(card).join('')}</div>
      </div>`;
    } else if (!filtering) {
      html += `<div class="recipe-section">
        <div class="section-header"><h2>${esc(u.cats[cat])}</h2></div>
        <div class="empty-section"><p>${esc(u.emptyTitle)}</p><p>${esc(u.emptyBody)}</p></div>
      </div>`;
    }
  });

  if (filtering && !anyShown) html = `<div class="no-results">${esc(u.noResults)}</div>`;
  main.innerHTML = html;
}

function openRecipe(id) {
  currentId = id;
  const c = content(id), r = recipes[id], u = ui();
  const by = r.contributor ? `<p class="modal-by">${esc(u.contributedBy)} ${esc(r.contributor)}</p>` : '';
  const fallback = !hasTranslation(id) ? `<div class="modal-note modal-note-info">${esc(u.translationSoon)}</div>` : '';
  const ingredients = c.ingredients.map(([qty,name]) => `<li><span style="color:var(--ink)">${esc(name)}</span><span>${esc(qty)}</span></li>`).join('');
  const steps = c.steps.map(s => `<li>${esc(s)}</li>`).join('');
  let note = '';
  if (Array.isArray(c.note)) {
    note = `<div class="modal-note"><ul class="note-list">${c.note.map(n => `<li>${esc(n)}</li>`).join('')}</ul></div>`;
  } else if (c.note) {
    note = `<div class="modal-note">${esc(c.note)}</div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    ${photoHTML(id, true)}
    <p class="modal-tag">${esc(c.tag)}</p>
    <h2 class="modal-title">${esc(c.title)}</h2>
    <p class="modal-desc">${esc(c.desc)}</p>
    ${by}
    ${fallback}
    <div class="modal-divider"></div>
    <div class="modal-meta">
      <div class="modal-meta-item"><span class="modal-meta-label">${esc(u.timeLabel)}</span><span class="modal-meta-value">${esc(c.time)}</span></div>
      <div class="modal-meta-item"><span class="modal-meta-label">${esc(u.servesLabel)}</span><span class="modal-meta-value">${esc(r.serves)}</span></div>
    </div>
    <div class="modal-badges">${badgesHTML(id)}</div>
    <div class="modal-section"><h4>${esc(u.ingredients)}</h4><ul class="ingredients-list">${ingredients}</ul></div>
    <div class="modal-section"><h4>${esc(u.method)}</h4><ol class="steps-list">${steps}</ol></div>
    ${note}
    <div class="modal-actions"><button class="print-btn" onclick="window.print()">${esc(u.print)}</button></div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeRecipe() {
  currentId = null;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeIfBg(e) { if (e.target === document.getElementById('overlay')) closeRecipe(); }

function setFilter(cat) { filter = cat; buildTabs(); buildScopeOptions(); render(); }
function onSearch(v) { query = v; render(); }
function onScope(v) { searchScope = v; render(); }

function setLang(code) {
  lang = code;
  try { localStorage.setItem('tfr-lang', code); } catch (e) {}
  const u = ui();
  document.documentElement.lang = code;
  document.documentElement.dir = u.dir;
  document.getElementById('eyebrow').textContent = u.eyebrow;
  document.getElementById('brandEm').textContent = u.brandEm;
  document.getElementById('sub').textContent = u.sub;
  document.getElementById('footer').textContent = u.footer;
  document.getElementById('submitCtaBtn').textContent = u.submitBtn;
  document.getElementById('search').placeholder = u.search;
  buildTabs();
  buildLangOptions();
  buildScopeOptions();
  buildFilters();
  render();
  if (currentId) openRecipe(currentId);
}

(function init() {
  let start = '';
  try { start = localStorage.getItem('tfr-lang') || ''; } catch (e) {}
  if (!I18N[start]) {
    const navLang = (navigator.language || 'en').slice(0,2);
    start = I18N[navLang] ? navLang : 'en';
  }
  setLang(start);
})();

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRecipe(); });
</script>
</body>
</html>
